<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的旅程 - Mint Journeys</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --mint-light: #f7f4d5;
            --mint-main: #839958;
            --mint-dark: #0a3323;
            --background: #f8f8f8;
            --peach-main: #bb6830;
            --almost-black: #111A19;
            --radius: 5px;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            background-color: var(--background);
            font-family: 'Merriweather', 'Noto Serif TC', serif;
            color: var(--almost-black);
            padding-bottom: 100px; /* 為右下角按鈕留空間 */
        }

        /* 導覽列 */
        nav {
            background-color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--mint-dark);
            font-weight: 700;
        }

        .nav-brand img { height: 30px; }

        .btn-logout {
            background: none;
            border: 1.5px solid var(--peach-main);
            color: var(--peach-main);
            padding: 6px 15px;
            border-radius: var(--radius);
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-logout:hover {
            background-color: var(--peach-main);
            color: white;
        }

        /* 頁面容器 */
        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        h2 {
            font-size: 24px;
            color: var(--mint-dark);
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        h2::before {
            content: "";
            width: 4px;
            height: 24px;
            background-color: var(--mint-main);
            display: inline-block;
            border-radius: var(--radius);
        }

        /* 行程卡片 */
        .trip-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .trip-card {
            background-color: white;
            padding: 20px;
            border-radius: var(--radius);
            border-left: 5px solid var(--mint-main);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            display: block;
        }

        .trip-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .trip-card.member-trip {
            border-left-color: var(--peach-main);
        }

        .trip-name {
            font-size: 20px; /* H3 */
            margin: 0 0 10px 0;
            font-weight: 700;
            color: var(--almost-black);
        }

        .trip-date {
            font-size: 14px; /* Small */
            color: #666;
        }

        /* 固定新增按鈕 */
        .fab {
            position: fixed;
            right: 30px;
            bottom: 30px;
            width: 60px;
            height: 60px;
            background-color: var(--mint-main);
            color: var(--mint-light);
            border-radius: 50%; /* 圓形按鈕是個例外，但符合 FAB 標準 */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: 0.3s;
            z-index: 200;
        }

        .fab:hover {
            background-color: var(--mint-dark);
            transform: scale(1.1);
        }

        /* 無資料狀態 */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
            background: #eee;
            border-radius: var(--radius);
            border: 2px dashed #ccc;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/home" class="nav-brand">
            <img src="../static/icon.webp" alt="icon">
            <span>Mint Journeys</span>
        </a>
        <button class="btn-logout" onclick="handleLogout()">登出</button>
    </nav>

    <div class="container">
        <h2>我的行程</h2>
        <div id="creator-list" class="trip-grid">
            <p class="empty-state">正在載入行程...</p>
        </div>

        <h2>與我分享的行程</h2>
        <div id="member-list" class="trip-grid">
            <p class="empty-state">正在載入行程...</p>
        </div>
    </div>

    <a href="/trip/new" class="fab" title="新增行程">+</a>

    <script>
        document.addEventListener('DOMContentLoaded', fetchTrips);

        async function fetchTrips() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/';
                return;
            }

            try {
                // 連api：
                const res = await fetch('/api/trips', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const result = await res.json();
                console.log(result.data)
                const { trips, shareTrips } = result.data;

                renderList('creator-list', trips, false);
                renderList('member-list', shareTrips, true);

            } catch (err) {
                console.error("載入失敗", err);
            }
        }

        function renderList(containerId, trips, isMember) {
            const container = document.getElementById(containerId);
            if (!trips || trips.length === 0) {
                container.innerHTML = '<p class="empty-state">目前還沒有行程，開始規劃一個吧！</p>';
                return;
            }

            container.innerHTML = trips.map(trip => `
                <a href="/trip/detail" class="trip-card ${isMember ? 'member-trip' : ''}">
                    <div class="trip-name">${trip.name}</div>
                    <div class="trip-date">${formatDate(trip.start_date)} - ${formatDate(trip.end_date)}</div>
                </a>
            `).join('');
        }

        function formatDate(dateStr) {
            if (!dateStr) return "未定";
            return dateStr.replace(/-/g, '/');
        }

        function handleLogout() {
            if (confirm('確定要登出嗎？')) {
                localStorage.removeItem('token');
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
