<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mint Journeys</title>
    <!-- 設定 icon -->
    <link rel="icon" href="../static/icon.webp" />
    <!-- 字體 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --mint-light: #f7f4d5;
        --mint-main: #839958;
        --mint-dark: #0a3323;
        --background: #f8f8f8;
        --peach-main: #bb6830;
        --almost-black: #111a19;
        --radius: 5px;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: var(--background);
        font-family: 'Merriweather', 'Noto Serif TC', serif;
        color: var(--almost-black);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
        padding: 2rem;
        max-width: 600px;
      }

      /* 標題圖片 */
      .title-img {
        max-width: 300px;
        height: auto;
        margin-bottom: 2.5rem;
        display: block;
        margin-left: auto;
        margin-right: auto;
      }

      /* 簡短副標題 */
      .tagline {
        font-size: 16px; /* Body */
        color: var(--mint-dark);
        margin-bottom: 3rem;
        letter-spacing: 0.05em;
      }

      /* 按鈕容器 */
      .auth-actions {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        width: 100%;
        max-width: 280px;
        margin: 0 auto;
      }

      /* 按鈕基礎樣式 */
      .btn {
        padding: 12px 24px;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
        border-radius: var(--radius);
        transition: all 0.3s ease;
        cursor: pointer;
        border: 2px solid transparent;
        text-align: center;
      }

      /* 登入按鈕 (主要) */
      .btn-login {
        background-color: var(--mint-main);
        color: var(--mint-light);
      }

      .btn-login:hover {
        background-color: var(--mint-dark);
      }

      /* 註冊按鈕 (次要) */
      .btn-register {
        background-color: transparent;
        border-color: var(--mint-main);
        color: var(--mint-main);
      }

      .btn-register:hover {
        background-color: var(--mint-light);
      }

      /* 頁尾小字 */
      footer {
        margin-top: 4rem;
        font-size: 12px; /* Caption */
        color: var(--almost-black);
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="../static/title.webp" alt="Mint Journeys" class="title-img" />

      <div class="auth-actions">
        <a href="#" class="btn btn-login" onclick="handleLogin()">登入</a>
        <a href="#" class="btn btn-register" onclick="handleRegister()"
          >註冊新帳號</a
        >
      </div>
    </div>

    <script>
      function handleLogin() {
        window.location.href = '/auth';
      }

      function handleRegister() {
        window.location.href = '/auth?mode=register';
      }
    </script>
  </body>
</html>
